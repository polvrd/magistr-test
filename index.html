<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Менеджмент</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f7;
    --card: #fff;
    --text: #1d1d1f;
    --text-dim: #86868b;
    --border: #d2d2d7;
    --primary: #007aff;
    --primary-hover: #0060cc;
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== MENU ===== */
  .menu-screen {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px;
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .menu-screen h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .menu-screen .subtitle {
    color: var(--text-dim);
    font-size: .95rem;
    margin-bottom: 32px;
  }
  .menu-screen .blocks-label {
    font-size: .85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .blocks-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .block-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all .15s ease;
    user-select: none;
    position: relative;
  }
  .block-card .block-order {
    position: absolute;
    top: -6px; right: -6px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-size: .75rem;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .block-card.selected .block-order {
    display: flex;
  }
  .block-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow);
  }
  .block-card.selected {
    background: #007aff;
    border-color: #007aff;
    color: #fff;
  }
  .block-card.selected .block-count {
    color: rgba(255,255,255,.7);
  }
  .block-card .block-name {
    font-size: .95rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .block-card .block-count {
    font-size: .8rem;
    color: var(--text-dim);
  }
  .block-card.selected .block-count {
    color: rgba(255,255,255,.7);
  }

  .menu-controls {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .menu-controls .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .menu-controls .toggle-row .toggle-label {
    font-size: .9rem;
    font-weight: 500;
  }
  .menu-controls .toggle-row .toggle-desc {
    font-size: .8rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .toggle-switch {
    width: 52px;
    height: 30px;
    background: #e5e5ea;
    border-radius: 15px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }
  .toggle-switch.active { background: var(--primary); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 24px; height: 24px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .toggle-switch.active::after {
    transform: translateX(22px);
  }

  .menu-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
    text-align: center;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
  .btn-primary:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #f5f5f7; }
  .btn-danger {
    background: var(--red);
    color: #fff;
  }
  .btn-danger:hover { opacity: .9; }
  .btn-success {
    background: var(--green);
    color: #fff;
  }

  .continue-bar {
    display: none;
    background: var(--orange);
    color: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
    align-items: center;
    justify-content: space-between;
    font-size: .9rem;
    font-weight: 500;
  }
  .continue-bar.show { display: flex; }
  .continue-bar .btn-continue {
    background: rgba(255,255,255,.25);
    border: none;
    color: #fff;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    font-size: .85rem;
  }
  .continue-bar .btn-continue:hover { background: rgba(255,255,255,.35); }

  /* ===== TEST ===== */
  .test-screen {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px;
    height: 100vh;   /* fallback */
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .test-screen.active {
    display: flex;
  }

  .test-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .test-topbar .btn-back-menu {
    background: none;
    border: none;
    color: var(--primary);
    cursor: pointer;
    font-size: .9rem;
    font-weight: 500;
    font-family: inherit;
    padding: 4px 8px;
  }

  .progress-container {
    flex: 1;
    min-width: 100px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: #e5e5ea;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width .3s;
  }
  .progress-text {
    font-size: .85rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 500;
  }
  .progress-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    max-height: 56px;
    overflow-y: auto;
  }
  .progress-dot {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .65rem;
    font-weight: 600;
    color: #fff;
    background: #e5e5ea;
    cursor: pointer;
  }
  .progress-dot.current {
    background: var(--primary);
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--primary);
  }
  .progress-dot.correct { background: var(--green); }
  .progress-dot.wrong { background: var(--red); }

  .question-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
  }
  .question-text {
    font-size: 1.15rem;
    line-height: 1.5;
    margin-bottom: 24px;
    font-weight: 500;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .option-btn {
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    font-size: .95rem;
    text-align: left;
    transition: all .15s;
    font-family: inherit;
    line-height: 1.4;
    color: var(--text);
  }
  .option-btn:hover:not(.disabled) {
    border-color: var(--primary);
    background: #f0f5ff;
  }
  .option-btn.selected {
    border-color: var(--primary);
    background: #f0f5ff;
  }
  .option-btn.correct-answer {
    border-color: var(--green);
    background: #e8f8ee;
  }
  .option-btn.wrong-answer {
    border-color: var(--red);
    background: #ffe8e6;
  }
  .option-btn.disabled {
    cursor: default;
    opacity: .85;
  }
  .option-btn .option-letter {
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: #e5e5ea;
    text-align: center;
    line-height: 24px;
    font-size: .8rem;
    font-weight: 600;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .option-btn.correct-answer .option-letter {
    background: var(--green);
    color: #fff;
  }
  .option-btn.wrong-answer .option-letter {
    background: var(--red);
    color: #fff;
  }

  .test-bottom {
    margin-top: auto;
    padding-top: 16px;
    display: flex;
    gap: 10px;
  }
  .test-bottom .btn {
    flex: 1;
  }

  /* ===== RESULTS ===== */
  .results-screen {
    max-width: 700px;
    margin: 0 auto;
    padding: 60px 24px;
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .results-screen h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .results-score {
    font-size: 3.5rem;
    font-weight: 800;
    margin: 24px 0 8px;
  }
  .results-score .score-numerator { color: var(--primary); }
  .results-score .score-sep { color: var(--text-dim); }
  .results-score .score-denominator { color: var(--text-dim); }
  .results-pct {
    font-size: 1.1rem;
    color: var(--text-dim);
    margin-bottom: 32px;
  }
  .results-list {
    margin-bottom: 32px;
  }
  .result-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .result-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .85rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .result-icon.correct { background: var(--green); color: #fff; }
  .result-icon.wrong { background: var(--red); color: #fff; }

  .result-item .result-q {
    flex: 1;
  }
  .result-item .result-q .rq-text {
    font-size: .9rem;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .result-item .result-q .rq-answer {
    font-size: .8rem;
    color: var(--text-dim);
  }
  .result-item .result-q .rq-correct {
    font-size: .8rem;
    color: var(--green);
    font-weight: 500;
  }

  .results-actions {
    display: flex;
    gap: 10px;
  }
  .results-actions .btn { flex: 1; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .menu-screen { padding: 24px 16px; }
    .blocks-grid { grid-template-columns: 1fr; }
    .test-screen { padding: 12px 16px; }
    .question-text { font-size: 1rem; }
    .progress-dots { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; max-height: none; }
    .progress-dot { width: 20px; height: 20px; font-size: .6rem; }
    .results-screen { padding: 24px 16px; }
    .results-score { font-size: 2.5rem; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- MENU SCREEN -->
  <div class="menu-screen screen active" id="menuScreen">
    <h1>Менеджмент</h1>
    <p class="subtitle">Подготовка к вступительному тестированию</p>

    <div class="continue-bar" id="continueBar">
      <span>У вас есть сохранённый тест</span>
      <button class="btn-continue" onclick="continueTest()">Продолжить</button>
    </div>

    <div class="blocks-label">Выберите блоки для тестирования</div>
    <div class="blocks-grid" id="blocksGrid"></div>

    <div class="menu-controls">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Перемешать вопросы</div>
          <div class="toggle-desc">Вкл — случайный порядок, Выкл — как в документе</div>
        </div>
        <div class="toggle-switch active" id="shuffleToggle" onclick="toggleShuffle()"></div>
      </div>
    </div>

    <div class="menu-actions">
      <button class="btn btn-primary" id="startBtn" onclick="startTest()" disabled>Начать тест</button>
      <button class="btn btn-secondary" onclick="resetAll()">Сбросить выбор</button>
    </div>
  </div>

  <!-- TEST SCREEN -->
  <div class="test-screen screen" id="testScreen">
    <div class="test-topbar">
      <button class="btn-back-menu" onclick="confirmExit()">← Выйти</button>
      <div class="progress-container">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="progress-text" id="progressText">0 / 0</span>
      </div>
    </div>
    <div class="progress-dots" id="progressDots"></div>
    <div class="question-area">
      <div class="question-text" id="questionText"></div>
      <div class="options-list" id="optionsList"></div>
    </div>
    <div class="test-bottom" id="testBottom">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Далее</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="results-screen screen" id="resultsScreen">
    <h1>Результат</h1>
    <div class="results-score">
      <span class="score-numerator" id="resultCorrect">0</span>
      <span class="score-sep"> / </span>
      <span class="score-denominator" id="resultTotal">0</span>
    </div>
    <div class="results-pct" id="resultPct">0%</div>
    <div class="results-list" id="resultsList"></div>
    <div class="results-actions">
      <button class="btn btn-primary" onclick="backToMenu()">В меню</button>
      <button class="btn btn-secondary" onclick="retryTest()">Пройти заново</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
let QUESTIONS_DATA = [];

async function loadQuestions() {
  try {
    const res = await fetch('questions.json');
    QUESTIONS_DATA = await res.json();
    init();
  } catch(e) {
    document.getElementById('blocksGrid').innerHTML = '<p style="color:var(--red);padding:20px;">Ошибка загрузки вопросов. Проверьте подключение к интернету.</p>';
  }
}

// ============================================================
// STATE
// ============================================================
let state = {
  selectedBlocks: [],
  shuffle: true,
  currentQuestions: [],
  currentIndex: 0,
  furthestReached: 0,
  answers: [],        // index -> selected option index (-1 = unanswered)
  answered: [],       // index -> boolean (has answer been submitted)
  results: [],        // index -> boolean (correct or not)
  finished: false,
  testActive: false
};

// ============================================================
// INIT
// ============================================================
function init() {
  renderBlocks();
  loadState();
  if (state.testActive) {
    document.getElementById('continueBar').classList.add('show');
  }
}

function renderBlocks() {
  const grid = document.getElementById('blocksGrid');
  grid.innerHTML = '';
  QUESTIONS_DATA.forEach((block, idx) => {
    const card = document.createElement('div');
    card.className = 'block-card';
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="block-order"></div>
      <div class="block-name">${block.name}</div>
      <div class="block-count">${block.questions.length} вопросов</div>
    `;
    card.addEventListener('click', () => toggleBlock(idx));
    grid.appendChild(card);
  });
}

function toggleBlock(idx) {
  const i = state.selectedBlocks.indexOf(idx);
  if (i > -1) state.selectedBlocks.splice(i, 1);
  else state.selectedBlocks.push(idx);
  updateBlocksUI();
  saveState();
}

function updateBlocksUI() {
  const cards = document.querySelectorAll('.block-card');
  cards.forEach((card, idx) => {
    const order = state.selectedBlocks.indexOf(idx);
    const isSelected = order !== -1;
    card.classList.toggle('selected', isSelected);
    const badge = card.querySelector('.block-order');
    if (badge) badge.textContent = isSelected ? order + 1 : '';
  });
  const total = state.selectedBlocks.reduce((sum, idx) => sum + QUESTIONS_DATA[idx].questions.length, 0);
  document.getElementById('startBtn').disabled = state.selectedBlocks.length === 0;
  document.getElementById('startBtn').textContent =
    state.selectedBlocks.length > 0 ? `Начать тест (${total} вопросов)` : 'Начать тест';
}

function toggleShuffle() {
  state.shuffle = !state.shuffle;
  document.getElementById('shuffleToggle').classList.toggle('active', state.shuffle);
  saveState();
}

// ============================================================
// START TEST
// ============================================================
function startTest() {
  if (state.selectedBlocks.length === 0) return;

  // Collect questions from selected blocks
  let questions = [];
  state.selectedBlocks.forEach(idx => {
    QUESTIONS_DATA[idx].questions.forEach(q => {
      questions.push({ ...q, blockIdx: idx });
    });
  });

  if (state.shuffle) {
    // Fisher-Yates shuffle
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
  }

  state.currentQuestions = questions;
  state.currentIndex = 0;
  state.furthestReached = 0;
  state.answers = new Array(questions.length).fill(-1);
  state.answered = new Array(questions.length).fill(false);
  state.results = new Array(questions.length).fill(false);
  state.finished = false;
  state.testActive = true;

  saveState();
  showTest();
}

function continueTest() {
  if (!state.testActive || state.finished) {
    resetTest();
    return;
  }
  showTest();
}

function showTest() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('testScreen').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const q = state.currentQuestions[state.currentIndex];
  const total = state.currentQuestions.length;
  const idx = state.currentIndex;

  // Progress bar
  const answered = state.answered.filter(a => a).length;
  document.getElementById('progressFill').style.width = `${(answered / total) * 100}%`;
  document.getElementById('progressText').textContent = `${idx + 1} / ${total}`;

  // Progress dots
  const dotsContainer = document.getElementById('progressDots');
  dotsContainer.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (i === idx) dot.classList.add('current');
    else if (state.answered[i] && state.results[i]) dot.classList.add('correct');
    else if (state.answered[i] && !state.results[i]) dot.classList.add('wrong');
    dot.textContent = i + 1;
    dot.addEventListener('click', () => {
      if (state.answered[i] || i <= state.furthestReached) goToQuestion(i);
    });
    dotsContainer.appendChild(dot);
  }

  // Question text
  // Show block name if it's a new block
  let questionText = q.text;
  document.getElementById('questionText').textContent = questionText;

  // Options
  const optionsList = document.getElementById('optionsList');
  optionsList.innerHTML = '';

  const letters = ['А', 'Б', 'В', 'Г', 'Д', 'Е'];
  const isAnswered = state.answered[idx];
  const selectedOption = state.answers[idx];

  q.options.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[oi] || oi}</span> ${opt}`;

    if (isAnswered) {
      btn.classList.add('disabled');
      if (oi === q.correct) btn.classList.add('correct-answer');
      if (oi === selectedOption && oi !== q.correct) btn.classList.add('wrong-answer');
    } else {
      btn.addEventListener('click', () => selectOption(oi));
      if (oi === selectedOption) btn.classList.add('selected');
    }

    optionsList.appendChild(btn);
  });

  // Next button
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = false;
  if (isAnswered) {
    if (idx < total - 1) {
      nextBtn.textContent = 'Далее →';
      nextBtn.className = 'btn btn-primary';
      nextBtn.onclick = nextQuestion;
    } else {
      nextBtn.textContent = 'Завершить';
      nextBtn.className = 'btn btn-success';
      nextBtn.onclick = finishTest;
    }
  } else {
    nextBtn.textContent = 'Далее →';
    nextBtn.className = 'btn btn-primary';
    if (selectedOption === -1) nextBtn.disabled = true;
    if (selectedOption === -1) {
      nextBtn.onclick = null;
    } else {
      nextBtn.onclick = submitAnswer;
    }
  }

  saveState();
}

function selectOption(idx) {
  if (state.answered[state.currentIndex]) return;
  state.answers[state.currentIndex] = idx;
  saveState();
  renderQuestion();
}

function submitAnswer() {
  const idx = state.currentIndex;
  const q = state.currentQuestions[idx];
  const selected = state.answers[idx];

  if (selected === -1) return;

  state.answered[idx] = true;
  state.results[idx] = (selected === q.correct);
  saveState();
  renderQuestion();
}

function nextQuestion() {
  if (state.currentIndex < state.currentQuestions.length - 1) {
    state.currentIndex++;
    if (state.currentIndex > state.furthestReached) {
      state.furthestReached = state.currentIndex;
    }
    renderQuestion();
  }
}

function goToQuestion(idx) {
  if (idx >= 0 && idx < state.currentQuestions.length) {
    state.currentIndex = idx;
    renderQuestion();
  }
}

function finishTest() {
  state.finished = true;
  state.testActive = false;
  saveState();
  showResults();
}

function showResults() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('resultsScreen').classList.add('active');

  const total = state.currentQuestions.length;
  const correct = state.results.filter(r => r).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('resultCorrect').textContent = correct;
  document.getElementById('resultTotal').textContent = total;
  document.getElementById('resultPct').textContent = `${pct}%`;

  const list = document.getElementById('resultsList');
  list.innerHTML = '';
  const letters = ['А', 'Б', 'В', 'Г', 'Д', 'Е'];

  state.currentQuestions.forEach((q, idx) => {
    if (!state.answered[idx]) return;
    const isCorrect = state.results[idx];
    const item = document.createElement('div');
    item.className = 'result-item';

    const icon = document.createElement('div');
    icon.className = `result-icon ${isCorrect ? 'correct' : 'wrong'}`;
    icon.textContent = isCorrect ? '✓' : '✗';
    item.appendChild(icon);

    const content = document.createElement('div');
    content.className = 'result-q';
    content.innerHTML = `
      <div class="rq-text">${q.text}</div>
      <div class="rq-answer">Ваш ответ: ${letters[state.answers[idx]] || state.answers[idx]}</div>
      ${!isCorrect ? `<div class="rq-correct">Правильный: ${letters[q.correct]} — ${q.options[q.correct]}</div>` : ''}
    `;
    item.appendChild(content);

    list.appendChild(item);
  });
}

function backToMenu() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('menuScreen').classList.add('active');
  document.getElementById('continueBar').classList.remove('show');
  updateBlocksUI();
}

function retryTest() {
  resetTest();
  startTest();
}

function resetTest() {
  state.testActive = false;
  state.finished = false;
  state.currentQuestions = [];
  state.currentIndex = 0;
  state.answers = [];
  state.answered = [];
  state.results = [];
  document.getElementById('continueBar').classList.remove('show');
  saveState();
  backToMenu();
}

function resetAll() {
  state.selectedBlocks = [];
  state.testActive = false;
  state.finished = false;
  state.currentQuestions = [];
  state.currentIndex = 0;
  state.answers = [];
  state.answered = [];
  state.results = [];
  document.getElementById('continueBar').classList.remove('show');
  updateBlocksUI();
  saveState();
}

function confirmExit() {
  if (confirm('Вы уверены, что хотите выйти? Прогресс сохранится.')) {
    backToMenu();
  }
}

// ============================================================
// LOCALSTORAGE
// ============================================================
function saveState() {
  try {
    const toSave = {
      selectedBlocks: state.selectedBlocks,
      shuffle: state.shuffle,
      currentQuestions: state.currentQuestions,
      currentIndex: state.currentIndex,
      furthestReached: state.furthestReached,
      answers: state.answers,
      answered: state.answered,
      results: state.results,
      finished: state.finished,
      testActive: state.testActive
    };
    localStorage.setItem('magistr_test_state', JSON.stringify(toSave));
  } catch (e) { /* ignore */ }
}

function loadState() {
  try {
    const saved = localStorage.getItem('magistr_test_state');
    if (saved) {
      const data = JSON.parse(saved);
      state.selectedBlocks = data.selectedBlocks || [];
      state.shuffle = data.shuffle !== undefined ? data.shuffle : true;
      state.currentQuestions = data.currentQuestions || [];
      state.currentIndex = data.currentIndex || 0;
      state.furthestReached = data.furthestReached || 0;
      state.answers = data.answers || [];
      state.answered = data.answered || [];
      state.results = data.results || [];
      state.finished = data.finished || false;
      state.testActive = data.testActive || false;
    }
    document.getElementById('shuffleToggle').classList.toggle('active', state.shuffle);
    updateBlocksUI();
  } catch (e) { /* ignore */ }
}

// ============================================================
// START
// ============================================================
loadQuestions();
</script>
